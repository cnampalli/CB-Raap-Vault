<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Pattern A versus Pattern B compared. Pattern A: CD/RO reads its own KV secret; CD/RO is the reader; KV v2 read-only; audit shows CD/RO. Pattern B: CD/RO mints a JWT and hands it to AAP; AAP is the reader; dynamic secrets and signed SSH; CD/RO never sees the secret.">
  <rect x="0" y="0" width="960" height="470" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="959" height="469" rx="16" fill="none" stroke="#e2e8f0"/>

  <text x="32" y="46" font-size="23" font-weight="700" fill="#0f172a">Two ways to use the token</text>
  <text x="32" y="72" font-size="14" fill="#64748b">Same JWT. Pattern A keeps the read inside CD/RO; Pattern B hands it to AAP. Use both in one release.</text>

  <!-- row label column -->
  <!-- Pattern A header -->
  <rect x="266" y="92" width="330" height="52" rx="10" fill="#ecfdf5" stroke="#059669"/>
  <circle cx="296" cy="118" r="14" fill="#059669"/>
  <text x="296" y="123" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">A</text>
  <text x="318" y="114" font-size="14.5" font-weight="700" fill="#065f46">CD/RO reads its own secret</text>
  <text x="318" y="132" font-size="11.5" fill="#047857">in-CD/RO read</text>

  <!-- Pattern B header -->
  <rect x="608" y="92" width="320" height="52" rx="10" fill="#fffbeb" stroke="#d97706"/>
  <circle cx="638" cy="118" r="14" fill="#d97706"/>
  <text x="638" y="123" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">B</text>
  <text x="660" y="114" font-size="14.5" font-weight="700" fill="#92400e">Mint &amp; hand off to AAP</text>
  <text x="660" y="132" font-size="11.5" fill="#b45309">external consumer</text>

  <!-- comparison rows -->
  <g font-size="12">
    <!-- row backgrounds -->
    <rect x="32" y="156" width="896" height="46" rx="8" fill="#f8fafc"/>
    <rect x="32" y="252" width="896" height="46" rx="8" fill="#f8fafc"/>
    <rect x="32" y="348" width="896" height="46" rx="8" fill="#f8fafc"/>

    <!-- Row 1 -->
    <text x="48" y="184" font-weight="700" fill="#334155">What CD/RO does</text>
    <text x="282" y="184" fill="#065f46">Logs in &amp; reads the KV secret itself</text>
    <text x="624" y="184" fill="#92400e">Mints a JWT into a property, launches AAP</text>
    <!-- Row 2 -->
    <text x="48" y="232" font-weight="700" fill="#334155">Who talks to Vault</text>
    <text x="282" y="232" fill="#065f46">CD/RO (this release's token)</text>
    <text x="624" y="232" fill="#92400e">AAP, with its own role &amp; policy</text>
    <!-- Row 3 -->
    <text x="48" y="280" font-weight="700" fill="#334155">Secret type</text>
    <text x="282" y="280" fill="#065f46">KV v2 static secret (read-only)</text>
    <text x="624" y="280" fill="#92400e">Dynamic secrets + signed SSH certs</text>
    <!-- Row 4 -->
    <text x="48" y="328" font-weight="700" fill="#334155">Who sees the value</text>
    <text x="282" y="328" fill="#065f46">CD/RO (into a masked credential)</text>
    <text x="624" y="328" fill="#92400e">Only AAP — CD/RO never sees it</text>
    <!-- Row 5 -->
    <text x="48" y="376" font-weight="700" fill="#334155">Audit shows</text>
    <text x="282" y="376" fill="#065f46">CD/RO as the reader</text>
    <text x="624" y="376" fill="#92400e">AAP as the reader</text>
  </g>

  <!-- column separators -->
  <line x1="266" y1="150" x2="266" y2="400" stroke="#e2e8f0"/>
  <line x1="608" y1="150" x2="608" y2="400" stroke="#e2e8f0"/>

  <!-- footer: when to use -->
  <rect x="32" y="410" width="440" height="44" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="52" y="430" font-size="12" font-weight="700" fill="#065f46">Use A when…</text>
  <text x="52" y="447" font-size="11.5" fill="#475569">the release needs a DB password / API key for itself.</text>

  <rect x="488" y="410" width="440" height="44" rx="10" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="508" y="430" font-size="12" font-weight="700" fill="#92400e">Use B when…</text>
  <text x="508" y="447" font-size="11.5" fill="#475569">a downstream AAP job needs dynamic creds or server SSH.</text>
</svg>
