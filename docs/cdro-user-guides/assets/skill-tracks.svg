<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Three skill tracks: Explorer (see the picture), Operator (do it step by step), and Engineer (automate and harden).">
  <rect x="0" y="0" width="960" height="380" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="959" height="379" rx="16" fill="none" stroke="#e2e8f0"/>

  <text x="32" y="46" font-size="23" font-weight="700" fill="#0f172a">Pick the track that fits you</text>
  <text x="32" y="72" font-size="14" fill="#64748b">Same destination, three depths. You can switch tracks any time &#8212; they cross-link.</text>

  <!-- Explorer -->
  <rect x="32" y="100" width="288" height="248" rx="14" fill="#f0f9ff" stroke="#0284c7"/>
  <circle cx="72" cy="140" r="22" fill="#0284c7"/>
  <text x="72" y="148" font-size="22" text-anchor="middle" fill="#ffffff">&#128064;</text>
  <text x="108" y="134" font-size="18" font-weight="700" fill="#075985">Explorer</text>
  <text x="108" y="154" font-size="12.5" fill="#0369a1">&#8220;Just show me how it works.&#8221;</text>
  <line x1="52" y1="172" x2="300" y2="172" stroke="#bae6fd"/>
  <text x="52" y="196" font-size="12.5" fill="#334155">&#9679;&#160; Non-technical &amp; managers</text>
  <text x="52" y="220" font-size="12.5" fill="#334155">&#9679;&#160; Reads the infographics only</text>
  <text x="52" y="244" font-size="12.5" fill="#334155">&#9679;&#160; No terminal, no commands</text>
  <text x="52" y="268" font-size="12.5" fill="#334155">&#9679;&#160; Understands the &#8220;why&#8221; &amp; flow</text>
  <rect x="52" y="292" width="248" height="38" rx="8" fill="#ffffff" stroke="#7dd3fc"/>
  <text x="176" y="315" font-size="12.5" font-weight="600" fill="#075985" text-anchor="middle">Follow the &#9733; Explorer callouts</text>

  <!-- Operator -->
  <rect x="336" y="100" width="288" height="248" rx="14" fill="#eff6ff" stroke="#2563eb"/>
  <circle cx="376" cy="140" r="22" fill="#2563eb"/>
  <text x="376" y="148" font-size="22" text-anchor="middle" fill="#ffffff">&#128295;</text>
  <text x="412" y="134" font-size="18" font-weight="700" fill="#1e40af">Operator</text>
  <text x="412" y="154" font-size="12.5" fill="#1d4ed8">&#8220;Walk me through doing it.&#8221;</text>
  <line x1="356" y1="172" x2="604" y2="172" stroke="#bfdbfe"/>
  <text x="356" y="196" font-size="12.5" fill="#334155">&#9679;&#160; Release / platform engineers</text>
  <text x="356" y="220" font-size="12.5" fill="#334155">&#9679;&#160; Copy-paste steps that work</text>
  <text x="356" y="244" font-size="12.5" fill="#334155">&#9679;&#160; Fills in the plugin form fields</text>
  <text x="356" y="268" font-size="12.5" fill="#334155">&#9679;&#160; Runs a release end to end</text>
  <rect x="356" y="292" width="248" height="38" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="480" y="315" font-size="12.5" font-weight="600" fill="#1e40af" text-anchor="middle">Follow the numbered Steps</text>

  <!-- Engineer -->
  <rect x="640" y="100" width="288" height="248" rx="14" fill="#faf5ff" stroke="#7c3aed"/>
  <circle cx="680" cy="140" r="22" fill="#7c3aed"/>
  <text x="680" y="148" font-size="22" text-anchor="middle" fill="#ffffff">&#9881;</text>
  <text x="716" y="134" font-size="18" font-weight="700" fill="#5b21b6">Engineer</text>
  <text x="716" y="154" font-size="12.5" fill="#6d28d9">&#8220;Give me the depth &amp; edge cases.&#8221;</text>
  <line x1="660" y1="172" x2="908" y2="172" stroke="#e9d5ff"/>
  <text x="660" y="196" font-size="12.5" fill="#334155">&#9679;&#160; Vault / security engineers</text>
  <text x="660" y="220" font-size="12.5" fill="#334155">&#9679;&#160; Hardening, rotation, scoping</text>
  <text x="660" y="244" font-size="12.5" fill="#334155">&#9679;&#160; Concurrency &amp; failure modes</text>
  <text x="660" y="268" font-size="12.5" fill="#334155">&#9679;&#160; Links to the reference series</text>
  <rect x="660" y="292" width="248" height="38" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="784" y="315" font-size="12.5" font-weight="600" fill="#5b21b6" text-anchor="middle">Follow the &#9881; Deep-dive boxes</text>
</svg>
