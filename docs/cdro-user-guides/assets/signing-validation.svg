<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="The signing and validation crux. CD/RO holds the private key and signs the JWT locally. Vault holds the matching public key and validates offline. There is no discovery endpoint and no callback from Vault to CD/RO.">
  <rect x="0" y="0" width="960" height="470" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="959" height="469" rx="16" fill="none" stroke="#e2e8f0"/>

  <text x="32" y="46" font-size="23" font-weight="700" fill="#0f172a">The crux: how Vault trusts CD/RO's token</text>
  <text x="32" y="72" font-size="14" fill="#64748b">A matched key pair. The private half signs; the public half checks. They never travel together.</text>

  <!-- CD/RO side -->
  <rect x="32" y="104" width="360" height="316" rx="14" fill="#eef2ff" stroke="#4f46e5"/>
  <text x="52" y="134" font-size="16" font-weight="700" fill="#3730a3">CD/RO side (signs)</text>

  <rect x="52" y="150" width="320" height="70" rx="10" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="72" y="176" font-size="28">&#128273;</text>
  <text x="112" y="172" font-size="13.5" font-weight="700" fill="#3730a3">PRIVATE key</text>
  <text x="112" y="192" font-size="12" fill="#475569">Held only in a CD/RO Credential.</text>
  <text x="112" y="208" font-size="12" fill="#475569">Lock its ACL. Never leaves CD/RO.</text>

  <rect x="52" y="234" width="320" height="86" rx="10" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="72" y="260" font-size="13.5" font-weight="700" fill="#3730a3">Plugin builds &amp; signs the JWT</text>
  <text x="72" y="281" font-size="12" fill="#475569">Header: alg = asymmetric (e.g. RS256)</text>
  <text x="72" y="299" font-size="12" fill="#475569">Payload: iss=ZeroTrust, aud, job_name,</text>
  <text x="72" y="315" font-size="12" fill="#475569">short exp (~900s). Signed with the private key.</text>

  <rect x="52" y="334" width="320" height="66" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="72" y="360" font-size="12.5" fill="#334155">Rotation is a <tspan font-weight="700" fill="#3730a3">manual, coordinated</tspan> step:</text>
  <text x="72" y="380" font-size="12" fill="#475569">add the new public key to Vault first, then swap</text>
  <text x="72" y="396" font-size="12" fill="#475569">the private key here (dual-trust window).</text>

  <!-- middle: token travels -->
  <g>
    <line x1="392" y1="262" x2="568" y2="262" stroke="#4f46e5" stroke-width="2.5" marker-end="url(#ar)"/>
    <rect x="410" y="238" width="140" height="34" rx="17" fill="#ffffff" stroke="#4f46e5"/>
    <text x="480" y="259" font-size="12" font-weight="700" fill="#4f46e5" text-anchor="middle">signed JWT &#8594;</text>
    <text x="480" y="292" font-size="11" fill="#64748b" text-anchor="middle">travels over the login call</text>
  </g>

  <!-- NO callback banner -->
  <rect x="410" y="330" width="140" height="70" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-dasharray="5 4"/>
  <text x="480" y="356" font-size="20" text-anchor="middle">&#128683;</text>
  <text x="480" y="378" font-size="11.5" font-weight="700" fill="#b91c1c" text-anchor="middle">No JWKS / no</text>
  <text x="480" y="393" font-size="11.5" font-weight="700" fill="#b91c1c" text-anchor="middle">callback to CD/RO</text>

  <!-- Vault side -->
  <rect x="568" y="104" width="360" height="316" rx="14" fill="#ecfeff" stroke="#0891b2"/>
  <text x="588" y="134" font-size="16" font-weight="700" fill="#0e7490">Vault side (validates)</text>

  <rect x="588" y="150" width="320" height="70" rx="10" fill="#ffffff" stroke="#a5f3fc"/>
  <text x="608" y="176" font-size="28">&#128275;</text>
  <text x="648" y="172" font-size="13.5" font-weight="700" fill="#0e7490">PUBLIC key</text>
  <text x="648" y="192" font-size="12" fill="#475569">Pasted into the mount config as</text>
  <text x="648" y="208" font-size="12" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#0e7490">jwt_validation_pubkeys</text>

  <rect x="588" y="234" width="320" height="86" rx="10" fill="#ffffff" stroke="#a5f3fc"/>
  <text x="608" y="260" font-size="13.5" font-weight="700" fill="#0e7490">Checks the token offline</text>
  <text x="608" y="281" font-size="12" fill="#475569">&#10003;&#160; signature matches the public key</text>
  <text x="608" y="299" font-size="12" fill="#475569">&#10003;&#160; iss == bound_issuer (&#8220;ZeroTrust&#8221;)</text>
  <text x="608" y="315" font-size="12" fill="#475569">&#10003;&#160; aud, job_name match the role</text>

  <rect x="588" y="334" width="320" height="66" rx="10" fill="#f0fdfa" stroke="#5eead4"/>
  <text x="608" y="360" font-size="12.5" fill="#334155">Issues a <tspan font-weight="700" fill="#0e7490">short-lived token</tspan> scoped by a</text>
  <text x="608" y="380" font-size="12" fill="#475569">templated policy to only this release's KV path.</text>
  <text x="608" y="396" font-size="12" fill="#475569">Audit records the read as <tspan font-weight="700" fill="#0e7490">CD/RO</tspan>.</text>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4f46e5"/>
    </marker>
  </defs>
</svg>
